name: 🚀 斗地主一键自动部署 (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 前端依赖安装与打包
        run: |
          cd poker-frontend
          npm install
          npm run build

      - name: ☕ 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: ⚙️ 后端 Maven 编译打包
        run: |
          cd poker
          mvn clean package -DskipTests

      - name: 📤 上传构建产物到阿里云
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "poker-frontend/dist/*,poker/target/poker-0.0.1-SNAPSHOT.jar"
          target: "/tmp"

      - name: 🔄 远程执行替换与重启脚本
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "1. 停止旧版后端..."
            killall -9 java || true
            sleep 3

            echo "2. 备份旧版本..."
            mkdir -p /root/backup/frontend /root/backup/backend /root/backup/database
            rm -rf /root/backup/frontend/* /root/backup/backend/* /root/backup/database/*
            cp -r /var/www/html/. /root/backup/frontend/ 2>/dev/null || true
            cp /poker/poker-0.0.1-SNAPSHOT.jar /root/backup/backend/ 2>/dev/null || true
            cp /poker/data/poker-auth.mv.db /root/backup/database/ 2>/dev/null || true
            cp /poker/data/poker-auth.trace.db /root/backup/database/ 2>/dev/null || true

            echo "3. 部署新版本..."
            mkdir -p /var/www/html /poker /poker/data
            rm -rf /var/www/html/*
            mv /tmp/poker-frontend/dist/* /var/www/html/
            mv /tmp/poker/target/poker-0.0.1-SNAPSHOT.jar /poker/

            echo "4. 启动后端并重启 Nginx..."
            cd /poker
            rm -f /poker/data/poker-auth.lock.db
            nohup java -jar poker-0.0.1-SNAPSHOT.jar > game.log 2>&1 &
            systemctl restart nginx

            echo "5. 清理临时垃圾..."
            rm -rf /tmp/poker-frontend /tmp/poker
            echo "✅ 部署大功告成！"
