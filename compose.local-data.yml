services:
  mysql:
    image: mysql:8.4
    container_name: poker-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: poker_auth
      MYSQL_USER: poker
      MYSQL_PASSWORD: poker123
      MYSQL_ROOT_PASSWORD: root123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - poker_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: poker-local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - poker_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  poker_mysql_data:
  poker_redis_data:
