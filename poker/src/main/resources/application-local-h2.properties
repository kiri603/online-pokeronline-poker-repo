app.auth.redis-enabled=false

spring.datasource.url=${POKER_DB_URL:jdbc:h2:file:./data/poker-auth;MODE=MYSQL;AUTO_SERVER=TRUE;NON_KEYWORDS=USER}
spring.datasource.username=${POKER_DB_USERNAME:sa}
spring.datasource.password=${POKER_DB_PASSWORD:}
spring.datasource.driver-class-name=${POKER_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

spring.session.store-type=none
