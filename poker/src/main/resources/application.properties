spring.application.name=poker-server
spring.profiles.default=local-h2

app.auth.allowed-origins=${POKER_ALLOWED_ORIGINS:*}

app.data-migration.mode=${POKER_DATA_MIGRATION_MODE:none}
app.data-migration.h2.url=${POKER_MIGRATION_H2_URL:jdbc:h2:file:./data/poker-auth;MODE=MYSQL;AUTO_SERVER=TRUE;NON_KEYWORDS=USER}
app.data-migration.h2.username=${POKER_MIGRATION_H2_USERNAME:sa}
app.data-migration.h2.password=${POKER_MIGRATION_H2_PASSWORD:}
app.data-migration.report-directory=${POKER_MIGRATION_REPORT_DIRECTORY:./data/migration-reports}

spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.data.redis.host=${POKER_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${POKER_REDIS_PORT:6379}
spring.data.redis.password=${POKER_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false
spring.session.redis.namespace=poker:session

server.servlet.session.timeout=12h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
