spring.application.name=poker-server

app.auth.redis-enabled=${POKER_REDIS_ENABLED:false}
app.auth.allowed-origins=${POKER_ALLOWED_ORIGINS:*}

spring.datasource.url=${POKER_DB_URL:jdbc:h2:file:./data/poker-auth;MODE=MYSQL;AUTO_SERVER=TRUE;NON_KEYWORDS=USER}
spring.datasource.username=${POKER_DB_USERNAME:sa}
spring.datasource.password=${POKER_DB_PASSWORD:}
spring.datasource.driver-class-name=${POKER_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.data.redis.host=${POKER_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${POKER_REDIS_PORT:6379}
spring.data.redis.password=${POKER_REDIS_PASSWORD:}
spring.session.store-type=${POKER_SESSION_STORE:none}
spring.session.redis.namespace=poker:session

server.servlet.session.timeout=12h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
