spring.datasource.url=jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.session.store-type=none
app.auth.redis-enabled=false
app.auth.allowed-origins=*
app.data-migration.mode=none
app.data-migration.h2.url=jdbc:h2:mem:source-testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
app.data-migration.h2.username=sa
app.data-migration.h2.password=
app.data-migration.report-directory=./target/migration-reports
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common
